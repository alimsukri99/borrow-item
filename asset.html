<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asset Details | Department Assets</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="container">
        <div class="nav-header">
            <a href="index.html" class="back-link">
                ‹ Back to Assets
            </a>
        </div>

        <div class="card asset-hero" id="asset-info">
            <div class="loader-spinner"></div>
            <p style="text-align: center;">Fetching details...</p>
        </div>

        <div id="borrow-section" class="card action-card borrow" style="display:none;">
            <div class="card-header">
                <h3>Borrow Asset</h3>
                <p>Enter your details below to check out this item.</p>
            </div>

            <div class="input-group">
                <label>Staff ID</label>
                <input type="text" id="staff-id" placeholder="e.g. S004000000">
            </div>

            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="staff-name" placeholder="Nama">
            </div>

            <div class="input-group">
                <label>Team</label>
                <input type="text" id="staff-team" placeholder="e.g. System">
            </div>

            <div class="input-group">
                <label>Borrow Date</label>
                <input type="date" id="borrow-date">
            </div>

            <button id="confirm-borrow-btn">Confirm Borrow</button>
        </div>

        <div id="return-section" class="card action-card return" style="display:none;">
            <div class="card-header">
                <h3>Return Asset</h3>
                <p>Verify your details to return this item.</p>
            </div>

            <div class="borrower-info">
                <label>Currently held by</label>
                <div id="borrower-display" class="highlight-text"></div>
            </div>

            <div class="input-group">
                <label>Verification ID</label>
                <input type="text" id="verify-staff-id" placeholder="Enter your ID to confirm">
            </div>

            <button id="return-btn">Return Item</button>
        </div>

        <div class="card history-card">
            <div class="card-header" style="margin-bottom: 16px;">
                <h3 style="font-size: 1.2rem;">Recent Activity</h3>
            </div>
            <div id="history-list" class="timeline"></div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>

</html>
