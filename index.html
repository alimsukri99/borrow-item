<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Department Assets</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="container">
        <h1>📦 Pinjam Jap 📦</h1>
        <h1>System Borrowing System</h1>
        <p>Welcome to System Team assets borrowing and returning application. Search by asset name or borrower name, or
            use the filters below.</p>
        <div style="margin-bottom: 12px;">
            <input type="text" id="asset-search" placeholder="Search asset name or borrower..."
                style="margin-bottom: 0;">
        </div>

        <div class="filters-row">
            <div class="filter-group">
                <label for="status-filter" class="filter-label">Availability</label>
                <select id="status-filter" class="filter-select">
                    <option value="all">All Statuses</option>
                    <option value="available">✅ Available</option>
                    <option value="borrowed">🔒 Borrowed</option>
                </select>
            </div>

            <div class="filter-group" id="category-filter-group" style="display:none;">
                <label for="category-filter" class="filter-label">Category</label>
                <select id="category-filter" class="filter-select">
                    <option value="all">All Categories</option>
                </select>
            </div>
        </div>

        <div id="asset-count" class="asset-count"></div>

        <div id="asset-list"></div>
    </div>

    <script src="js/app.js"></script>
</body>

</html>
